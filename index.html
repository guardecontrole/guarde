<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Financeiro Moderno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- FIREBASE COMPAT (Evita o uso de type="module") -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-gray-300">
    <div id="root"></div>

    <script>
        // Mapeando a versão compat para a estrutura que o seu app espera
        window.firebase = {
            initializeApp: firebase.initializeApp,
            getAuth: firebase.auth, 
            onAuthStateChanged: (auth, cb) => auth().onAuthStateChanged(cb), 
            signInWithEmailAndPassword: (auth, email, pass) => auth().signInWithEmailAndPassword(email, pass), 
            createUserWithEmailAndPassword: (auth, email, pass) => auth().createUserWithEmailAndPassword(email, pass), 
            GoogleAuthProvider: firebase.auth.GoogleAuthProvider, 
            signInWithPopup: (auth, provider) => auth().signInWithPopup(provider), 
            signOut: (auth) => auth().signOut(),
            getFirestore: firebase.firestore, 
            collection: (db, path) => db.collection(path), 
            doc: (db, path, id) => id ? db.collection(path).doc(id) : db.doc(path), 
            onSnapshot: (ref, cb) => ref.onSnapshot(cb), 
            addDoc: (colRef, data) => colRef.add(data), 
            deleteDoc: (docRef) => docRef.delete(), 
            updateDoc: (docRef, data) => docRef.update(data), 
            setDoc: (docRef, data, options) => docRef.set(data, options), 
            getDoc: (docRef) => docRef.get(), 
            serverTimestamp: firebase.firestore.FieldValue.serverTimestamp
        };
    </script>

    <script src="firebase-config.js" type="text/babel"></script>
    <script src="utils/icons.js" type="text/babel"></script>
    <script src="utils/helpers.js" type="text/babel"></script>
    
    <script src="components/AuthModal.js" type="text/babel"></script>
    <script src="components/OnboardingModal.js" type="text/babel"></script>
    <script src="components/SettingsModal.js" type="text/babel"></script>
    <script src="components/AdjustReserveModal.js" type="text/babel"></script>
    <script src="components/LeanTimesCalculatorModal.js" type="text/babel"></script>
    <script src="components/Tour.js" type="text/babel"></script>
    <script src="components/RecordsTable.js" type="text/babel"></script>
    <script src="components/EditModal.js" type="text/babel"></script>
    <script src="components/FinancialEvolutionChart.js" type="text/babel"></script>
    <script src="components/MonthlyBalanceHistoryTable.js" type="text/babel"></script>
    <script src="components/ContributionAnalysis.js" type="text/babel"></script>
    <script src="components/StabilityReserveHistoryTable.js" type="text/babel"></script>
    <script src="components/SortIndicator.js" type="text/babel"></script>
    
    <script src="hooks/useSortableData.js" type="text/babel"></script>

    <script src="app.js" type="text/babel"></script>
</body>
</html>
