<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Financeiro Moderno</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 - Versões específicas e estáveis -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <!-- PropTypes -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>

    <!-- Firebase - Versão COMPAT (mais estável para CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Fallback para ícones enquanto não carregam */
        .icon-placeholder {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: currentColor;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-300">
    <div id="root"></div>

    <!-- Scripts principais - SEM type="module" e SEM data-type="module" -->
    <!-- Ordem correta de carregamento -->
    <script src="firebase-config.js"></script>
    <script src="utils/helpers.js"></script>
    
    <script src="components/AuthModal.js"></script>
    <script src="components/OnboardingModal.js"></script>
    <script src="components/SettingsModal.js"></script>
    <script src="components/AdjustReserveModal.js"></script>
    <script src="components/LeanTimesCalculatorModal.js"></script>
    <script src="components/Tour.js"></script>
    <script src="components/RecordsTable.js"></script>
    <script src="components/EditModal.js"></script>
    <script src="components/FinancialEvolutionChart.js"></script>
    <script src="components/MonthlyBalanceHistoryTable.js"></script>
    <script src="components/ContributionAnalysis.js"></script>
    <script src="components/StabilityReserveHistoryTable.js"></script>
    <script src="components/SortIndicator.js"></script>
    
    <script src="hooks/useSortableData.js"></script>
    
    <script src="orçamento.js"></script>
    <script src="app.js"></script>

</html>
